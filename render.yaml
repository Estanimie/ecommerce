services:
  - type: web
    runtime: node
    name: pista-nera-store
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    envVars:
      - key: MP_ENVIRONMENT
        value: test
      - key: MP_STATEMENT_DESCRIPTOR
        value: PISTANERA
      - key: APP_BASE_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
